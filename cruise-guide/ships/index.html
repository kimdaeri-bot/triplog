const FALLBACK = 'https://images.unsplash.com/photo-1570077188670-e3a8d69ac5ff?w=400&q=60';

function renderGrid(list) {
  document.getElementById('shipGrid').innerHTML = list.map(s => `
    <a class="s-card" href="${s.slug}/">
      <img src="${s.cover || FALLBACK}" alt="${s.title}" loading="lazy"
        onerror="this.src='${FALLBACK}'">
      <div class="s-card-body">
        <div class="name">${s.title}</div>
        <div class="meta">${s.launchYear ? s.launchYear + '년 취항 · ' : ''}</div>
      </div>
    </a>
  `).join('');
}

function filterShips(op, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid(op === 'all' ? SHIPS : SHIPS.filter(s => s.operator === op));
}

renderGrid(SHIPS);
